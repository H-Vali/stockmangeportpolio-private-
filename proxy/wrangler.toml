# 이 이름이 곧 배포 대상 Worker 서비스이자 공개 주소가 됩니다.
#   https://<name>.<계정 서브도메인>.workers.dev
# Workers Builds 로 연결한 대시보드 서비스 이름과 반드시 같아야 합니다.
# 다르면 wrangler 가 다른 이름의 Worker 를 새로 만들어 배포해서,
# 대시보드에서 등록한 시크릿이 없는 쪽으로 배포되고 /state 가 500 을 반환합니다.
name = "stockmangeportpolio"
main = "src/index.js"
compatibility_date = "2026-06-19"

# 시크릿(SYNC_TOKEN, FINNHUB_API_KEY)은 여기에 적지 않습니다.
# 대시보드 배포: Worker > Settings > Variables and Secrets 에서 Type=Secret 으로 추가
# 로컬 CLI 배포: wrangler secret put SYNC_TOKEN
#
# 주의: Workers Builds 설정 화면의 "변수 이름/변수 값" 칸은 빌드 타임 변수라
# 런타임 env 로 읽히지 않습니다. 거기에 넣으면 /state 가 계속 500을 반환합니다.

# 공동 운용 상태 저장용 KV 네임스페이스.
# 비밀값이 아니라 커밋해도 되는 식별자입니다.
# 새로 만들 때: wrangler kv namespace create ASSET_STATE
[[kv_namespaces]]
binding = "ASSET_STATE"
id = "897540445fbc49fda7bfcea242ca3256"
